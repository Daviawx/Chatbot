<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Assistente de Programação IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>DevAssist IA</h2>
            <span class="status">online</span>
        </header>

        <main class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                Olá! Sou seu assistente de programação. Posso ajudar com código, lógica, frameworks, boas práticas e muito mais. O que você precisa?
            </div>
        </main>

        <footer class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Digite sua dúvida de programação..." autocomplete="off">
                <button id="sendButton" aria-label="Enviar mensagem">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
