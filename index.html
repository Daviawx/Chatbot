<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DevAssist Pro · IA de Programação</title>
    <!-- Font Awesome 6 (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Highlight.js para syntax highlighting (tema escuro) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="chat-container">
            <!-- Cabeçalho com modos e ações -->
            <header class="chat-header">
                <div class="header-left">
                    <i class="fas fa-code header-icon"></i>
                    <h2>DevAssist <span class="beta">Pro</span></h2>
                </div>
                <div class="header-right">
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="fast" title="Respostas rápidas (gpt-3.5)"><i class="fas fa-bolt"></i> Fast</button>
                        <button class="mode-btn" data-mode="pro" title="Respostas elaboradas (gpt-4)"><i class="fas fa-crown"></i> Pro</button>
                    </div>
                    <button class="icon-btn" id="clearChat" title="Limpar conversa"><i class="fas fa-trash-alt"></i></button>
                    <button class="icon-btn" id="themeToggle" title="Alternar tema"><i class="fas fa-moon"></i></button>
                </div>
            </header>

            <!-- Área de mensagens -->
            <main class="chat-messages" id="chatMessages">
                <!-- Mensagem de boas-vindas será inserida via JS -->
            </main>

            <!-- Barra de sugestões (clique rápido) -->
            <div class="suggestions-bar" id="suggestionsBar">
                <button class="suggestion-chip" data-prompt="O que é uma closure em JavaScript?">Closure JS</button>
                <button class="suggestion-chip" data-prompt="Exemplo de requisição fetch com async/await">Fetch API</button>
                <button class="suggestion-chip" data-prompt="Diferença entre let, var e const">var vs let</button>
                <button class="suggestion-chip" data-prompt="Como otimizar performance React?">React perf</button>
                <button class="suggestion-chip" data-prompt="O que é TypeScript?">TypeScript</button>
            </div>

            <!-- Rodapé com input e botões -->
            <footer class="chat-footer">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Digite sua dúvida de programação..." rows="1"></textarea>
                    <button id="sendButton" aria-label="Enviar mensagem">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="footer-note">
                    <span><i class="fas fa-database"></i> Ilimitado • <i class="fas fa-microchip"></i> Modo <span id="currentModeLabel">Fast</span></span>
                </div>
            </footer>
        </div>
    </div>

    <!-- Highlight.js e Markdown (usaremos simple markdown parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
